server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: overhearr

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/overhearr_db}
    username: ${SPRING_DATASOURCE_USERNAME:overhearr}
    password: ${SPRING_DATASOURCE_PASSWORD:OverhearrDBPassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

overhearr:
  spotify:
    client-id: ${SPOTIFY_CLIENT_ID}
    client-secret: ${SPOTIFY_CLIENT_SECRET}

  default-admin:
    username: ${DEFAULT_ADMIN_USERNAME}
    password: ${DEFAULT_ADMIN_PASSWORD}

  token:
    jwt:
      expiration: ${TOKEN_EXPIRATION:730d}
      secret: ${APP_SECRET}

  password:
    encoder:
      argon2:
        memory: ${ARGON2_MEMORY:65536}
        iterations: ${ARGON2_ITERATIONS:3}
        parallelism: ${ARGON2_PARALLELISM:2}
