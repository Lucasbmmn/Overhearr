server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: overhearr

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/overhearr_db}
    username: ${SPRING_DATASOURCE_USERNAME:overhearr}
    password: ${SPRING_DATASOURCE_PASSWORD:OverhearrDBPassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

overhearr:
  spotify:
    client-id: ${SPOTIFY_CLIENT_ID}
    client-secret: ${SPOTIFY_CLIENT_SECRET}
