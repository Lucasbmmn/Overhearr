spring:
  application:
    name: overhearr

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

overhearr:
  password:
    encoder:
      argon2:
        memory: ${ARGON2_MEMORY:65536}
        iterations: ${ARGON2_ITERATIONS:3}
        parallelism: ${ARGON2_PARALLELISM:2}
